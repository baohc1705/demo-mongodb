syntax = "proto3";

option csharp_namespace = "DemoMongoDb.Grpc.Protos";

package menu;

service MenuService {
	rpc GetAllMenus (GetAllMenusRequest) returns (GetAllMenusResponse);
}

message MenuMessage {
	string id = 1;
	string name = 2;
	string description = 3;
	string url = 4;
	int32 order = 5;
	bool is_active = 6;
	string created_at = 7;
	string updated_at = 8;
}

message GetAllMenusRequest {}

message GetAllMenusResponse {
	repeated MenuMessage items = 1;
}
