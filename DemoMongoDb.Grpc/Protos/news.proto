syntax = "proto3";

option csharp_namespace = "DemoMongoDb.Grpc.Protos";

package news;

service NewsService {
	rpc GetAllNews (GetAllNewsRequest) returns (GetAllNewsResponse);
	rpc CreateNews (CreateNewsRequest) returns (CreateNewsResponse);
	rpc UpdateNews (UpdateNewsRequest) returns (UpdateNewsResponse); 
	rpc DeleteNewsById (DeleteNewsByIdRequest) returns (DeleteNewsByIdResponse);
}

// News Document
message NewsMessage {
	string id = 1;
	string title = 2;
	string slug = 3;
	string content = 4;
	string summary = 5;
	string thumbnail = 6;
	string author = 7;
	bool is_published = 8;
	string published_at = 9;
	repeated string tags = 10;
	string created_at = 11;
	string updated_at = 12;
}

// Get all menu
message GetAllNewsRequest {}

message GetAllNewsResponse {
	repeated NewsMessage items = 1;
}

// Create News
message CreateNewsRequest {
	string title = 1;
	string slug = 2;
	string content = 3;
	string summary = 4;
	string thumbnail = 5;
	string author = 6;
	bool is_published = 7;
	repeated string tags = 8;
}

message CreateNewsResponse {
	string id = 1;
}

// Update news
message UpdateNewsRequest {
	string id = 1;
	string title = 2;
	string slug = 3;
	string content = 4;
	string summary = 5;
	string thumbnail = 6;
	string author = 7;
	bool is_published = 8;
	repeated string tags = 9;
}

message UpdateNewsResponse {
	string id = 1;
}

// Delete by id
message DeleteNewsByIdRequest {
	string id = 1;
}

message DeleteNewsByIdResponse {
	bool success = 1;
}
